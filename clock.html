<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>6-Gear Nanosecond Watch with Numbers</title>
<style>
body {
	margin:0;
	background:#000;
	display:flex;
	flex-direction:column;
	justify-content:center;
	align-items:center;
	height:100vh;
	font-family:Arial;
	color:white;
	user-select:none;
}

#controls {
	margin-bottom:10px;
}

button {
	margin:2px;
	padding:5px 12px;
	font-size:14px;
	cursor:pointer;
}

canvas{
	background:#111;
	border-radius:50%;
}
</style>
</head>
<body>

<div id="controls">
	<button id="toggleGears">Toggle Gears</button>
	<button id="toggleFace">Toggle Face</button>
	<button id="toggleHands">Toggle Hands</button>
	<button id="toggleNano">Toggle Nano Hand</button>
	<button id="toggleNumbers">Toggle Numbers</button>
</div>

<canvas id="clock" width="600" height="600"></canvas>

<script>
// --------------------------
// Canvas Setup
// --------------------------
const canvas = document.getElementById("clock");
const ctx = canvas.getContext("2d");

const CX = 300;
const CY = 300;
const RADIUS = 250;

// --------------------------
// Toggleable Parts
// --------------------------
let showGears = true;
let showFace = true;
let showHands = true;
let showNanoHand = true;
let showNumbers = true;

document.getElementById("toggleGears").addEventListener("click", ()=> showGears = !showGears);
document.getElementById("toggleFace").addEventListener("click", ()=> showFace = !showFace);
document.getElementById("toggleHands").addEventListener("click", ()=> showHands = !showHands);
document.getElementById("toggleNano").addEventListener("click", ()=> showNanoHand = !showNanoHand);
document.getElementById("toggleNumbers").addEventListener("click", ()=> showNumbers = !showNumbers);

// --------------------------
// 6-Gear Train
// --------------------------
const gears = [
	{x:150,y:300,r:70,teeth:72,ratio:1,angle:0,color:"#777"}, // barrel
	{x:250,y:300,r:50,teeth:60,ratio:-0.833,angle:0,color:"#999"}, // center
	{x:330,y:300,r:40,teeth:50,ratio:-0.833,angle:0,color:"#bbb"}, // third
	{x:400,y:300,r:30,teeth:40,ratio:-0.8,angle:0,color:"#ddd"}, // fourth
	{x:300,y:180,r:35,teeth:30,ratio:-0.75,angle:0,color:"#aaa"}, // escapement
	{x:220,y:180,r:25,teeth:20,ratio:-0.666,angle:0,color:"#ccc"} // balance wheel
];

// --------------------------
// Draw Gear
// --------------------------
function drawGear(g){
	ctx.save();
	ctx.translate(g.x,g.y);
	ctx.rotate(g.angle);

	ctx.beginPath();
	for(let i=0;i<g.teeth;i++){
		let a = (i/g.teeth)*Math.PI*2;
		let r1 = g.r;
		let r2 = g.r+5;
		ctx.lineTo(Math.cos(a)*r1,Math.sin(a)*r1);
		ctx.lineTo(Math.cos(a+0.03)*r2,Math.sin(a+0.03)*r2);
	}
	ctx.closePath();
	ctx.strokeStyle=g.color;
	ctx.lineWidth=2;
	ctx.stroke();

	ctx.beginPath();
	ctx.arc(0,0,g.r*0.2,0,Math.PI*2);
	ctx.stroke();
	ctx.restore();
}

// --------------------------
// Clock Face
// --------------------------
function drawFace(){
	ctx.beginPath();
	ctx.arc(CX,CY,RADIUS,0,Math.PI*2);
	ctx.strokeStyle="white";
	ctx.lineWidth=4;
	ctx.stroke();

	// minute ticks
	for(let i=0;i<60;i++){
		let angle = i*Math.PI/30;
		let x1 = CX + Math.cos(angle)*(RADIUS-10);
		let y1 = CY + Math.sin(angle)*(RADIUS-10);
		let x2 = CX + Math.cos(angle)*(RADIUS-30);
		let y2 = CY + Math.sin(angle)*(RADIUS-30);
		ctx.beginPath();
		ctx.moveTo(x1,y1);
		ctx.lineTo(x2,y2);
		ctx.strokeStyle="white";
		ctx.lineWidth = i%5===0?3:1;
		ctx.stroke();
	}
}

// --------------------------
// Draw Numbers
// --------------------------
function drawNumbers(){
	ctx.save();
	ctx.fillStyle="white";
	ctx.font="24px Arial";
	ctx.textAlign="center";
	ctx.textBaseline="middle";

	for(let n=1;n<=12;n++){
		let angle = (n/12)*Math.PI*2 - Math.PI/2;
		let x = CX + Math.cos(angle)*(RADIUS-60);
		let y = CY + Math.sin(angle)*(RADIUS-60);
		ctx.fillText(n.toString(),x,y);
	}
	ctx.restore();
}

// --------------------------
// Draw Hands
// --------------------------
function drawHand(angle,length,width,color){
	ctx.save();
	ctx.translate(CX,CY);
	ctx.rotate(angle);
	ctx.beginPath();
	ctx.moveTo(0,0);
	ctx.lineTo(0,-length);
	ctx.strokeStyle=color;
	ctx.lineWidth=width;
	ctx.stroke();
	ctx.restore();
}

// --------------------------
// Animation
// --------------------------
function animate(){
	ctx.clearRect(0,0,600,600);

	// update gears
	gears[0].angle += 0.01;
	for(let i=1;i<gears.length;i++){
		gears[i].angle = gears[i-1].angle * gears[i].ratio;
	}

	if(showGears) gears.forEach(drawGear);
	if(showFace) drawFace();
	if(showNumbers) drawNumbers();

	const now = new Date();
	const hours = now.getHours()%12;
	const minutes = now.getMinutes();
	const seconds = now.getSeconds();
	const nano = performance.now()*1000000;

	const hourAngle   = (hours + minutes/60)*Math.PI/6;
	const minuteAngle = (minutes + seconds/60)*Math.PI/30;
	const secondAngle = (seconds + (nano/1e9))/60 * Math.PI*2;
	const nanoAngle   = (nano % 1e9)/1e9 * Math.PI*2;

	if(showHands){
		drawHand(hourAngle,120,6,"white");
		drawHand(minuteAngle,170,4,"white");
		drawHand(secondAngle,200,2,"cyan");
	}

	if(showNanoHand){
		drawHand(nanoAngle,220,1,"red");
	}

	requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
